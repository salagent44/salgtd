<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="currentColor" opacity="0.08"/>
    </pattern>
    <pattern id="crosses" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <line x1="23" y1="20" x2="25" y2="20" stroke="currentColor" stroke-width="0.5" opacity="0.05"/>
      <line x1="24" y1="19" x2="24" y2="21" stroke="currentColor" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <rect width="100%" height="100%" fill="url(#crosses)"/>
</svg>
