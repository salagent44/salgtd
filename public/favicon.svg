<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .box { fill: none; stroke: #000; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
    .check { fill: none; stroke: #000; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
    .line { fill: none; stroke: #000; stroke-width: 8; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .box, .check, .line { stroke: #fff; }
    }
  </style>
  <!-- Row 1: checked -->
  <rect class="box" x="14" y="16" width="22" height="22" rx="5"/>
  <polyline class="check" points="19,28 24,33 36,21"/>
  <line class="line" x1="50" y1="27" x2="110" y2="27"/>
  <!-- Row 2: checked -->
  <rect class="box" x="14" y="52" width="22" height="22" rx="5"/>
  <polyline class="check" points="19,64 24,69 36,57"/>
  <line class="line" x1="50" y1="63" x2="95" y2="63"/>
  <!-- Row 3: unchecked -->
  <rect class="box" x="14" y="88" width="22" height="22" rx="5"/>
  <line class="line" x1="50" y1="99" x2="85" y2="99"/>
</svg>
